<!DOCTYPE HTML>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站施工中...</title>
    <style>
        /* 全局重置与字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f7f8fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 24px;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #eaeef2;
            transition: box-shadow 0.2s ease;
        }

        /* 顶部标识线 */
        .badge-line {
            display: inline-block;
            background: #eef2f6;
            color: #4a5a6a;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 100px;
            margin-bottom: 28px;
        }

        /* 主标题 */
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1d2a3a;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
        }

        /* 分隔装饰线 — 极简 */
        .divider {
            width: 48px;
            height: 3px;
            background: #d0d8e0;
            border-radius: 4px;
            margin: 16px auto 20px;
        }

        /* 正文描述 */
        .description {
            font-size: 16px;
            line-height: 1.7;
            color: #3e4e5e;
            margin-bottom: 32px;
        }

        .description .highlight {
            color: #1d2a3a;
            font-weight: 500;
        }

        /* 日期与署名区块 */
        .meta {
            border-top: 1px solid #eef2f6;
            padding-top: 24px;
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .meta .name {
            font-size: 18px;
            font-weight: 500;
            color: #1d2a3a;
            letter-spacing: 0.3px;
        }

        .meta .date {
            font-size: 14px;
            color: #7a8a9a;
            font-weight: 400;
        }

        /* 底部 footer 信息 */
        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: #8e9eae;
            letter-spacing: 0.2px;
            border-top: 1px solid #f0f3f6;
            padding-top: 24px;
        }

        .footer-note span {
            color: #5a6a7a;
        }

        /* 响应式微调 */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px 28px;
            }

            h1 {
                font-size: 24px;
            }

            .description {
                font-size: 15px;
            }

            .meta .name {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 极简状态标签 -->
        <div class="badge-line">正在维护...</div>

        <!-- 主标题 -->
        <h1>网站施工中...</h1>

        <!-- 装饰分隔线 -->
        <div class="divider"></div>

        <!-- 描述文字 -->
        <p class="description">
            网站尚未搭建完成，暂不开放。<br>
            <span class="highlight">( 这可能会持续数年甚至更久 )</span>
        </p>

        <!-- 署名与日期 -->
        <div class="meta">
            <span class="name">吴邦豪</span>
            <span class="date">2026 年 07 月 22 日</span>
        </div>

        <!-- 底部服务信息 -->
        <div class="footer-note">
            <span>由 <a href="https://www.cloudflare.com">Cloudflare</a> 提供性能与安全服务</span>
        </div>

    </div>

</body>
</html>
