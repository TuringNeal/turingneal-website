<!DOCTYPE HTML>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站施工中...</title>
    <style>
        /* ===== CSS 变量 – 亮色主题 (默认) ===== */
        :root {
            --bg: #f7f8fa;
            --card-bg: #ffffff;
            --card-border: #eaeef2;
            --text-primary: #1d2a3a;
            --text-secondary: #3e4e5e;
            --text-muted: #8e9eae;
            --badge-bg: #eef2f6;
            --badge-color: #4a5a6a;
            --divider-bg: #d0d8e0;
            --meta-border: #eef2f6;
            --footer-border: #f0f3f6;
            --btn-border: #d0d8e0;
            --btn-color: #3e4e5e;
            --btn-hover-bg: #f0f3f6;
            --link-color: #5a6a7a;
        }

        /* ===== 暗色主题 (通过 data-theme="dark" 触发) ===== */
        [data-theme="dark"] {
            --bg: #1a1e26;
            --card-bg: #242a34;
            --card-border: #313842;
            --text-primary: #e6edf5;
            --text-secondary: #b0c0d0;
            --text-muted: #7a8a9a;
            --badge-bg: #2d3540;
            --badge-color: #b0c0d0;
            --divider-bg: #3a434f;
            --meta-border: #2d3540;
            --footer-border: #2d3540;
            --btn-border: #4a5a6a;
            --btn-color: #b0c0d0;
            --btn-hover-bg: #2d3540;
            --link-color: #8a9aaa;
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 24px;
            transition: background 0.25s ease;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid var(--card-border);
            transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        /* ===== 顶部标识 ===== */
        .badge-line {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-color);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 100px;
            margin-bottom: 28px;
            transition: background 0.25s ease, color 0.25s ease;
        }

        /* ===== 主标题 ===== */
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            margin-bottom: 12px;
            transition: color 0.25s ease;
        }

        /* ===== 分隔线 ===== */
        .divider {
            width: 48px;
            height: 3px;
            background: var(--divider-bg);
            border-radius: 4px;
            margin: 16px auto 20px;
            transition: background 0.25s ease;
        }

        /* ===== 正文描述 ===== */
        .description {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 32px;
            transition: color 0.25s ease;
        }

        .description .highlight {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ===== 署名与日期 ===== */
        .meta {
            border-top: 1px solid var(--meta-border);
            padding-top: 24px;
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: border-color 0.25s ease;
        }

        .meta .name {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            transition: color 0.25s ease;
        }

        .meta .date {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            transition: color 0.25s ease;
        }

        /* ===== 底部服务信息 ===== */
        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.2px;
            border-top: 1px solid var(--footer-border);
            padding-top: 24px;
            transition: color 0.25s ease, border-color 0.25s ease;
        }

        .footer-note a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease, color 0.2s ease;
        }

        .footer-note a:hover {
            border-bottom-color: var(--link-color);
            color: var(--text-primary);
        }

        /* ===== 主题切换按钮容器 ===== */
        .theme-toggle {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .theme-toggle button {
            background: transparent;
            border: 1px solid var(--btn-border);
            border-radius: 100px;
            padding: 5px 16px;
            font-size: 13px;
            font-weight: 400;
            color: var(--btn-color);
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            user-select: none;
        }

        .theme-toggle button:hover {
            background: var(--btn-hover-bg);
            border-color: var(--text-muted);
        }

        .theme-toggle button:focus-visible {
            outline: 2px solid var(--text-secondary);
            outline-offset: 2px;
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 480px) {
            .card {
                padding: 32px 20px 28px;
            }

            h1 {
                font-size: 24px;
            }

            .description {
                font-size: 15px;
            }

            .meta .name {
                font-size: 17px;
            }

            .theme-toggle button {
                padding: 4px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 状态标签 -->
        <div class="badge-line">正在维护</div>

        <!-- 主标题 -->
        <h1>网站施工中...</h1>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <!-- 描述 -->
        <p class="description">
            网站尚未搭建完成，暂不开放。<br>
            <span class="highlight">（这可能会持续数年甚至更久）</span>
        </p>

        <!-- 署名与日期 -->
        <div class="meta">
            <span class="name">吴邦豪</span>
            <span class="date">2026 年 07 月 22 日</span>
        </div>

        <!-- 底部服务信息 -->
        <div class="footer-note">
            <span>由 <a href="https://www.cloudflare.com">Cloudflare</a> 提供性能与安全服务</span>
        </div>

        <!-- 主题切换按钮 -->
        <div class="theme-toggle">
            <button id="theme-switch" aria-label="切换亮色/暗色模式">亮色</button>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const root = document.documentElement;
            const switchBtn = document.getElementById('theme-switch');

            // 获取当前主题，默认 'light'
            function getCurrentTheme() {
                return root.getAttribute('data-theme') || 'light';
            }

            // 应用主题并更新按钮文字
            function applyTheme(theme) {
                if (theme === 'dark') {
                    root.setAttribute('data-theme', 'dark');
                    switchBtn.textContent = '暗色';
                } else {
                    root.removeAttribute('data-theme');
                    switchBtn.textContent = '亮色';
                }
                localStorage.setItem('theme', theme);
            }

            // 切换亮/暗
            function toggleTheme() {
                const current = getCurrentTheme();
                const next = (current === 'light') ? 'dark' : 'light';
                applyTheme(next);
            }

            // 初始化：从 localStorage 读取偏好，若无则默认 'light'
            function init() {
                const stored = localStorage.getItem('theme');
                let theme = 'light';
                if (stored === 'dark' || stored === 'light') {
                    theme = stored;
                }
                applyTheme(theme);
                switchBtn.addEventListener('click', toggleTheme);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
